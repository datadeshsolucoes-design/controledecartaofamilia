<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Controle do Cartão</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            transition: background 0.3s ease, color 0.2s ease;
        }

        :root {
            --bg: #f4f7fc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #475569;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }

        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
        }

        body {
            background: var(--bg);
            padding: 20px;
            font-size: 18px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* CABEÇALHO */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-tema {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: 500;
        }

        /* FILTROS */
        .filtros {
            background: var(--card);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filtros input, .filtros select {
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg);
        }
        .btn-limpar {
            background: #64748b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .card {
            background: var(--card);
            padding: 18px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card h3 {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }
        .card .valor {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--primary);
        }

        /* BOTÕES DE AÇÃO */
        .botoes-acao {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn-acao {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-acao.ativo {
            background: var(--primary);
            color: white;
        }

        /* FORMULÁRIOS */
        .form-painel {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: none;
        }
        .form-painel.ativo {
            display: block;
        }
        .form-linha {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-grupo {
            flex: 1;
            min-width: 140px;
        }
        .form-grupo label {
            font-size: 0.75rem;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            color: var(--text-light);
        }
        .form-grupo input, .form-grupo select {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-danger { background: var(--danger); }

        /* LISTA DE DÍVIDAS */
        .divida-card {
            background: var(--card);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 5px solid var(--primary);
            box-shadow: var(--shadow);
        }
        .divida-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .progresso {
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            margin: 10px 0;
        }
        .progresso-preenchido {
            background: var(--success);
            height: 100%;
            border-radius: 10px;
        }
        .btn-pequeno {
            padding: 5px 12px;
            font-size: 0.75rem;
            margin-top: 8px;
            display: inline-block;
        }

        /* TABELA */
        .tabela-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            border-collapse: collapse;
        }
        th {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-conteudo {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }
        .hidden {
            display: none;
        }
        .info {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        @media (max-width: 700px) {
            body { padding: 12px; font-size: 16px; }
            .card .valor { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💳 Controle do Cartão</h1>
        <button class="btn-tema" id="btnTema">🌙 Modo escuro</button>
    </div>

    <div class="filtros">
        <input type="text" id="filtroNome" placeholder="🔍 Filtrar por nome">
        <select id="filtroCartao">
            <option value="all">Ambos cartões</option>
            <option value="A">Cartão A (dia 10)</option>
            <option value="B">Cartão B (dia 25)</option>
        </select>
        <button class="btn-limpar" id="limparFiltros">Limpar</button>
    </div>

    <div class="cards" id="cards"></div>

    <div class="botoes-acao">
        <button class="btn-acao ativo" data-acao="novo">➕ Nova dívida</button>
        <button class="btn-acao" data-acao="pagar">💰 Pagar parcela</button>
        <button class="btn-acao" data-acao="editar">✏️ Editar/Excluir</button>
    </div>

    <div id="painelNovo" class="form-painel ativo">
        <h3>➕ Nova dívida</h3>
        <div class="form-linha">
            <div class="form-grupo"><label>Nome</label><input type="text" id="novoNome" placeholder="Nome"></div>
            <div class="form-grupo"><label>WhatsApp</label><input type="text" id="novoWhats" placeholder="11999999999"></div>
            <div class="form-grupo"><label>Valor parcela (R$)</label><input type="number" id="novoValor" placeholder="275"></div>
            <div class="form-grupo"><label>Total parcelas</label><input type="number" id="novoTotal" placeholder="10"></div>
        </div>
        <div class="form-linha">
            <div class="form-grupo"><label>Parcelas já pagas</label><input type="number" id="novoPagas" value="0"></div>
            <div class="form-grupo"><label>Cartão</label><select id="novoCartao"><option value="A">Cartão A (dia 10)</option><option value="B">Cartão B (dia 25)</option></select></div>
            <div class="form-grupo"><label>Data início</label><input type="date" id="novoInicio"><div class="info">Deixe em branco para calcular</div></div>
        </div>
        <button id="salvarNovo">Salvar dívida</button>
    </div>

    <div id="painelPagar" class="form-painel">
        <h3>💰 Pagar parcela</h3>
        <div class="form-linha">
            <div class="form-grupo"><label>Dívida</label><select id="pagarSelect"></select></div>
            <div class="form-grupo"><label>Data pagamento</label><input type="date" id="pagarData"></div>
        </div>
        <button id="confirmarPagar">Confirmar pagamento</button>
    </div>

    <div id="painelEditar" class="form-painel">
        <h3>✏️ Editar/Excluir</h3>
        <div class="form-linha">
            <div class="form-grupo"><label>Dívida</label><select id="editarSelect"></select></div>
            <div class="form-grupo"><label>Valor parcela</label><input type="number" id="editarValor"></div>
            <div class="form-grupo"><label>Total parcelas</label><input type="number" id="editarTotal"></div>
        </div>
        <div class="form-linha">
            <div class="form-grupo"><label>Senha</label><input type="password" id="editarSenha" placeholder="Senha (270601)"></div>
        </div>
        <button id="salvarEdicao">Salvar</button>
        <button id="excluirDivida" class="btn-danger">Excluir</button>
    </div>

    <h2>📋 Dívidas ativas</h2>
    <div id="listaAtivas"></div>

    <h2>✅ Quitadas</h2>
    <div id="listaQuitadas"></div>

    <h2>📊 Tabela completa</h2>
    <div class="tabela-wrapper">
        <table>
            <thead><tr><th>Nome</th><th>Cartão</th><th>Parcela</th><th>Valor</th><th>Faltam</th><th>Total pendente</th><th>WhatsApp</th></tr></thead>
            <tbody id="tabelaBody"></tbody>
        </table>
    </div>
</div>

<div id="modalWhats" class="modal hidden">
    <div class="modal-conteudo">
        <h3>📲 Enviar WhatsApp</h3>
        <input type="text" id="whatsNumero" placeholder="Número com DDD">
        <textarea id="whatsMsg" rows="4" style="width:100%; margin:10px 0; padding:8px; border-radius:12px;"></textarea>
        <button id="enviarWhats">Enviar</button>
        <button id="fecharWhats">Cancelar</button>
    </div>
</div>

<script>
    // CONFIGURAÇÕES
    const SENHA = "270601";
    let dividas = [];
    let nextId = 1;
    const CARD_DUE = { A: 10, B: 25 };

    // CALCULAR DATA INÍCIO AUTOMÁTICA
    function calcularDataInicio(pagas, cartao) {
        let hoje = new Date();
        let dia = CARD_DUE[cartao];
        let ano = hoje.getFullYear();
        let mes = hoje.getMonth() - pagas;
        while(mes < 0) { mes += 12; ano--; }
        let ultimoDia = new Date(ano, mes + 1, 0).getDate();
        let diaFinal = Math.min(dia, ultimoDia);
        return `${ano}-${String(mes+1).padStart(2,'0')}-${String(diaFinal).padStart(2,'0')}`;
    }

    function vencimento(inicio, atual, cartao) {
        if(!inicio) return null;
        let [ano, mes] = inicio.split('-').map(Number);
        let dia = CARD_DUE[cartao];
        let mesVenc = mes + atual - 1;
        let anoVenc = ano;
        while(mesVenc > 12) { mesVenc -= 12; anoVenc++; }
        let ultimoDia = new Date(anoVenc, mesVenc, 0).getDate();
        let finalDia = Math.min(dia, ultimoDia);
        return `${String(finalDia).padStart(2,'0')}/${String(mesVenc).padStart(2,'0')}/${anoVenc}`;
    }

    function salvar() {
        localStorage.setItem('dividas_app', JSON.stringify(dividas));
        localStorage.setItem('nextId_app', nextId);
    }

    function carregar() {
        let saved = localStorage.getItem('dividas_app');
        let savedId = localStorage.getItem('nextId_app');
        if(saved) dividas = JSON.parse(saved);
        if(savedId) nextId = parseInt(savedId);
        if(!dividas.length) {
            dividas = [
                { id: nextId++, nome: "Ana", whats: "11999999999", valor: 275, total: 10, atual: 3, cartao: "A", inicio: "2025-03-10", pagamentos: [] },
                { id: nextId++, nome: "João", whats: "11888888888", valor: 500, total: 6, atual: 2, cartao: "B", inicio: "2025-04-25", pagamentos: [] }
            ];
            salvar();
        }
    }

    function filtrar() {
        let ativos = dividas.filter(d => d.atual <= d.total);
        let nome = document.getElementById('filtroNome').value.toLowerCase();
        let cartao = document.getElementById('filtroCartao').value;
        if(nome) ativos = ativos.filter(d => d.nome.toLowerCase().includes(nome));
        if(cartao !== 'all') ativos = ativos.filter(d => d.cartao === cartao);
        return ativos;
    }

    function atualizarTela() {
        let ativos = filtrar();
        let totalDivida = ativos.reduce((s,d) => s + (d.total - d.atual + 1) * d.valor, 0);
        
        document.getElementById('cards').innerHTML = `
            <div class="card"><h3>💰 Dívida total</h3><div class="valor">R$ ${totalDivida.toFixed(2)}</div></div>
            <div class="card"><h3>📦 Dívidas ativas</h3><div class="valor">${ativos.length}</div></div>
        `;
        
        let htmlAtivas = '';
        for(let d of ativos) {
            let faltam = d.total - d.atual + 1;
            let pendente = faltam * d.valor;
            let venc = vencimento(d.inicio, d.atual, d.cartao) || '—';
            let percent = ((d.atual-1)/d.total)*100;
            htmlAtivas += `
                <div class="divida-card">
                    <div class="divida-header"><span>${d.nome} (Cartão ${d.cartao})</span><span>${d.atual}/${d.total}</span></div>
                    <div>💰 R$ ${d.valor.toFixed(2)}/mês</div>
                    <div>📅 Vencimento: ${venc}</div>
                    <div class="progresso"><div class="progresso-preenchido" style="width:${percent}%"></div></div>
                    <div><strong>Faltam ${faltam}x = R$ ${pendente.toFixed(2)}</strong></div>
                    <button class="btn-pequeno" onclick="abrirWhats(${d.id})">📲 WhatsApp</button>
                </div>
            `;
        }
        document.getElementById('listaAtivas').innerHTML = htmlAtivas || '<p>Nenhuma dívida ativa.</p>';
        
        let quitadas = dividas.filter(d => d.atual > d.total);
        let htmlQuitadas = '';
        for(let d of quitadas) {
            htmlQuitadas += `<div class="divida-card" style="border-left-color:#10b981"><strong>${d.nome}</strong> (QUITADA) - ${d.total}x R$ ${d.valor.toFixed(2)}</div>`;
        }
        document.getElementById('listaQuitadas').innerHTML = htmlQuitadas || '<p>Nenhuma dívida quitada.</p>';
        
        let tabelaHtml = '';
        for(let d of ativos) {
            let faltam = d.total - d.atual + 1;
            tabelaHtml += `<tr>
                <td>${d.nome}</td>
                <td>${d.cartao}</td>
                <td>${d.atual}/${d.total}</td>
                <td>R$ ${d.valor.toFixed(2)}</td>
                <td>${faltam}</td>
                <td>R$ ${(faltam*d.valor).toFixed(2)}</td>
                <td><button class="btn-pequeno" onclick="abrirWhats(${d.id})">📲</button></td>
            刻`;
        }
        document.getElementById('tabelaBody').innerHTML = tabelaHtml || '<tr><td colspan="7">Nenhuma dívida ativa</td></tr>';
        
        let pagarSelect = document.getElementById('pagarSelect');
        pagarSelect.innerHTML = ativos.map(d => `<option value="${d.id}">${d.nome} - ${d.atual}/${d.total}</option>`).join('');
        
        let editarSelect = document.getElementById('editarSelect');
        editarSelect.innerHTML = dividas.map(d => `<option value="${d.id}">${d.nome} - ${d.atual}/${d.total}</option>`).join('');
        let selecionado = dividas.find(d => d.id == editarSelect.value);
        if(selecionado) {
            document.getElementById('editarValor').value = selecionado.valor;
            document.getElementById('editarTotal').value = selecionado.total;
        }
    }

    window.abrirWhats = function(id) {
        let d = dividas.find(x => x.id === id);
        if(!d) return;
        let faltam = d.total - d.atual + 1;
        let msg = `Olá ${d.nome}! Dívida cartão ${d.cartao}: ${d.atual}/${d.total} - R$ ${d.valor.toFixed(2)}/mês. Faltam ${faltam}x = R$ ${(faltam*d.valor).toFixed(2)}. Vencimento: ${vencimento(d.inicio, d.atual, d.cartao)}`;
        document.getElementById('whatsNumero').value = d.whats || '';
        document.getElementById('whatsMsg').value = msg;
        document.getElementById('modalWhats').classList.remove('hidden');
    };
    
    document.getElementById('enviarWhats').onclick = () => {
        let num = document.getElementById('whatsNumero').value.replace(/\D/g, '');
        let msg = encodeURIComponent(document.getElementById('whatsMsg').value);
        if(num) window.open(`https://wa.me/55${num}?text=${msg}`, '_blank');
        else alert("Número inválido");
        document.getElementById('modalWhats').classList.add('hidden');
    };
    document.getElementById('fecharWhats').onclick = () => document.getElementById('modalWhats').classList.add('hidden');
    
    document.getElementById('salvarNovo').onclick = () => {
        let nome = document.getElementById('novoNome').value.trim();
        let whats = document.getElementById('novoWhats').value.trim();
        let valor = parseFloat(document.getElementById('novoValor').value);
        let total = parseInt(document.getElementById('novoTotal').value);
        let pagas = parseInt(document.getElementById('novoPagas').value) || 0;
        let cartao = document.getElementById('novoCartao').value;
        let inicio = document.getElementById('novoInicio').value;
        
        if(!nome || isNaN(valor) || isNaN(total) || valor<=0 || total<=0) { alert("Preencha os campos"); return; }
        if(pagas >= total) { alert("Parcelas pagas inválidas"); return; }
        if(!inicio) inicio = calcularDataInicio(pagas, cartao);
        
        dividas.push({ id: nextId++, nome, whats, valor, total, atual: pagas+1, cartao, inicio, pagamentos: [] });
        salvar();
        atualizarTela();
        alert("✅ Dívida cadastrada!");
        
        document.getElementById('novoNome').value = '';
        document.getElementById('novoWhats').value = '';
        document.getElementById('novoValor').value = '';
        document.getElementById('novoTotal').value = '';
        document.getElementById('novoPagas').value = '0';
        document.getElementById('novoInicio').value = '';
    };
    
    document.getElementById('confirmarPagar').onclick = () => {
        let id = parseInt(document.getElementById('pagarSelect').value);
        let data = document.getElementById('pagarData').value;
        let d = dividas.find(x => x.id === id);
        if(!d || d.atual > d.total) { alert("Dívida quitada"); return; }
        if(!data) { alert("Data obrigatória"); return; }
        d.atual++;
        salvar();
        atualizarTela();
        alert("✅ Pagamento registrado!");
        document.getElementById('pagarData').value = '';
    };
    
    function verificarSenha() {
        if(document.getElementById('editarSenha').value !== SENHA) {
            alert("Senha incorreta!");
            return false;
        }
        return true;
    }
    
    document.getElementById('salvarEdicao').onclick = () => {
        if(!verificarSenha()) return;
        let id = parseInt(document.getElementById('editarSelect').value);
        let d = dividas.find(x => x.id === id);
        if(!d) return;
        let novoValor = parseFloat(document.getElementById('editarValor').value);
        let novoTotal = parseInt(document.getElementById('editarTotal').value);
        if(isNaN(novoValor) || isNaN(novoTotal)) return;
        d.valor = novoValor;
        if(novoTotal < d.atual) d.atual = novoTotal;
        d.total = novoTotal;
        if(d.atual > d.total) d.atual = d.total + 1;
        salvar();
        atualizarTela();
        alert("Atualizado!");
        document.getElementById('editarSenha').value = '';
    };
    
    document.getElementById('excluirDivida').onclick = () => {
        if(!verificarSenha()) return;
        let id = parseInt(document.getElementById('editarSelect').value);
        if(confirm("Excluir permanentemente?")) {
            dividas = dividas.filter(x => x.id !== id);
            salvar();
            atualizarTela();
            alert("Excluído!");
            document.getElementById('editarSenha').value = '';
        }
    };
    
    document.getElementById('limparFiltros').onclick = () => {
        document.getElementById('filtroNome').value = '';
        document.getElementById('filtroCartao').value = 'all';
        atualizarTela();
    };
    
    document.getElementById('btnTema').onclick = () => {
        document.body.classList.toggle('dark');
        document.getElementById('btnTema').innerText = document.body.classList.contains('dark') ? '☀️ Claro' : '🌙 Escuro';
    };
    
    document.querySelectorAll('.btn-acao').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.btn-acao').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            document.querySelectorAll('.form-painel').forEach(p => p.classList.remove('ativo'));
            document.getElementById(`painel${btn.getAttribute('data-acao').charAt(0).toUpperCase() + btn.getAttribute('data-acao').slice(1)}`).classList.add('ativo');
        };
    });
    
    document.getElementById('filtroNome').addEventListener('input', () => atualizarTela());
    document.getElementById('filtroCartao').addEventListener('change', () => atualizarTela());
    
    carregar();
    atualizarTela();
</script>
</body>
</html>
