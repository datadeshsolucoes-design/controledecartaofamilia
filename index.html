<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle do Cartão - Dívidas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #f1f5f9; padding: 20px; font-size: 18px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 2rem; color: #1e293b; margin-bottom: 20px; }
        .filtros { display: flex; gap: 15px; flex-wrap: wrap; background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; align-items: center; }
        .filtros input, .filtros select { padding: 10px; border-radius: 12px; border: 1px solid #ccc; font-size: 1rem; }
        .btn-limpar { background: #64748b; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { font-size: 0.9rem; color: #555; }
        .card .valor { font-size: 1.8rem; font-weight: bold; color: #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 18px; border-radius: 30px; font-size: 0.9rem; cursor: pointer; margin-top: 10px; }
        button:hover { background: #2563eb; }
        table { width: 100%; background: white; border-radius: 20px; border-collapse: collapse; overflow: hidden; margin-top: 20px; }
        th { background: #3b82f6; color: white; padding: 12px; text-align: left; font-size: 1rem; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        .divida-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; border-left: 5px solid #3b82f6; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 1rem; }
        .hidden { display: none; }
        @media (max-width: 700px) { body { padding: 12px; font-size: 16px; } }
    </style>
</head>
<body>
<div class="container">
    <h1>💳 Controle do Cartão - Dívidas</h1>

    <!-- FILTROS -->
    <div class="filtros">
        <input type="text" id="filtroNome" placeholder="🔍 Filtrar por nome">
        <select id="filtroCartao">
            <option value="all">Ambos cartões</option>
            <option value="A">Cartão A (dia 10)</option>
            <option value="B">Cartão B (dia 25)</option>
        </select>
        <button id="btnLimparFiltros" class="btn-limpar">🧹 Limpar filtros</button>
    </div>

    <!-- CARDS RESUMO -->
    <div class="cards" id="cards"></div>

    <!-- BOTÕES PRINCIPAIS -->
    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
        <button id="btnNovo">➕ Nova dívida</button>
        <button id="btnPagar">💰 Pagar parcela</button>
    </div>

    <!-- FORMULÁRIO NOVA DÍVIDA -->
    <div id="formNovo" style="background:white; padding:20px; border-radius:20px; margin-bottom:20px; display:none;">
        <h3>➕ Nova dívida no cartão</h3>
        <input type="text" id="nome" placeholder="Nome da pessoa" style="width:100%; padding:12px; margin:8px 0; border-radius:12px; border:1px solid #ccc;">
        <input type="text" id="telefone" placeholder="WhatsApp (ex: 11999999999)" style="width:100%; padding:12px; margin:8px 0; border-radius:12px; border:1px solid #ccc;">
        <input type="number" id="parcelaValor" placeholder="Valor da parcela (R$)" style="width:100%; padding:12px; margin:8px 0; border-radius:12px; border:1px solid #ccc;">
        <input type="number" id="totalParcelas" placeholder="Total de parcelas" style="width:100%; padding:12px; margin:8px 0; border-radius:12px; border:1px solid #ccc;">
        <select id="cartao" style="width:100%; padding:12px; margin:8px 0; border-radius:12px;">
            <option value="A">Cartão A (vence dia 10)</option>
            <option value="B">Cartão B (vence dia 25)</option>
        </select>
        <input type="date" id="dataInicio" style="width:100%; padding:12px; margin:8px 0; border-radius:12px;">
        <button id="salvarNovo" style="background:#10b981;">✅ Salvar dívida</button>
        <button id="cancelarNovo" style="background:#94a3b8;">Cancelar</button>
    </div>

    <!-- FORMULÁRIO PAGAR PARCELA -->
    <div id="formPagar" style="background:white; padding:20px; border-radius:20px; margin-bottom:20px; display:none;">
        <h3>💰 Pagar parcela</h3>
        <select id="selectPagar" style="width:100%; padding:12px; margin:8px 0; border-radius:12px;"></select>
        <input type="date" id="dataPagamento" style="width:100%; padding:12px; margin:8px 0; border-radius:12px;">
        <button id="confirmarPagamento" style="background:#10b981;">✅ Confirmar pagamento</button>
        <button id="cancelarPagar" style="background:#94a3b8;">Cancelar</button>
    </div>

    <!-- LISTA DE DÍVIDAS ATIVAS -->
    <h2>📋 Dívidas ativas no cartão</h2>
    <div id="listaDividas"></div>

    <!-- TABELA COMPLETA -->
    <h2>📊 Tabela completa de todas as dívidas</h2>
    <table id="tabelaCompleta">
        <thead><tr><th>Nome</th><th>Cartão</th><th>Parcela</th><th>Valor parcela</th><th>Faltam</th><th>Total pendente</th><th>WhatsApp</th></tr>
        </thead>
        <tbody id="tabelaBody"></tbody>
    </table>
</div>

<!-- MODAL WHATSAPP -->
<div id="modalWhats" class="modal hidden">
    <div class="modal-content">
        <h3>📲 Enviar cobrança via WhatsApp</h3>
        <input type="text" id="whatsNumero" placeholder="Número com DDD (ex: 11999999999)">
        <textarea id="whatsMensagem" rows="4" placeholder="Mensagem personalizada..."></textarea>
        <button id="btnEnviarWhats" style="background:#25D366;">📲 Enviar WhatsApp</button>
        <button id="btnFecharWhats">Cancelar</button>
    </div>
</div>

<script>
    let dividas = []; // mudamos o nome de emprestimos para dividas
    let whatsCallback = null;

    // Salvar no localStorage
    function salvarDados() {
        localStorage.setItem('dividasCartao', JSON.stringify(dividas));
    }

    // Carregar dados (sem exemplos automáticos)
    function carregarDados() {
        let dados = localStorage.getItem('dividasCartao');
        if(dados && dados !== '[]') {
            dividas = JSON.parse(dados);
        } else {
            dividas = []; // começa vazio, sem exemplos
        }
    }

    // Formatar data brasileira
    function formatarDataBrasil(dataISO) {
        if(!dataISO) return '';
        let partes = dataISO.split('-');
        if(partes.length !== 3) return dataISO;
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    // Calcular próxima data de vencimento
    function calcularVencimento(inicio, parcelaAtual, cartao) {
        if(!inicio) return 'não definida';
        let [ano, mes, dia] = inicio.split('-').map(Number);
        let diaVenc = cartao === 'A' ? 10 : 25;
        let mesVenc = mes + (parcelaAtual - 1);
        let anoVenc = ano;
        while(mesVenc > 12) { mesVenc -= 12; anoVenc++; }
        return `${String(diaVenc).padStart(2,'0')}/${String(mesVenc).padStart(2,'0')}/${anoVenc}`;
    }

    // Atualizar toda a tela
    function atualizarTela() {
        let nomeFiltro = document.getElementById('filtroNome').value.toLowerCase();
        let cartaoFiltro = document.getElementById('filtroCartao').value;
        
        let ativos = dividas.filter(d => d.parcelaAtual <= d.totalParcelas);
        
        if(nomeFiltro) ativos = ativos.filter(d => d.nome.toLowerCase().includes(nomeFiltro));
        if(cartaoFiltro !== 'all') ativos = ativos.filter(d => d.cartao === cartaoFiltro);
        
        // Cards
        let totalDivida = ativos.reduce((s, d) => s + (d.totalParcelas - d.parcelaAtual + 1) * d.valorParcela, 0);
        document.getElementById('cards').innerHTML = `
            <div class="card"><h3>💰 Dívida total no cartão</h3><div class="valor">R$ ${totalDivida.toFixed(2)}</div></div>
            <div class="card"><h3>📦 Dívidas ativas</h3><div class="valor">${ativos.length}</div></div>
        `;
        
        // Lista de dívidas (cards)
        let html = '';
        for(let d of ativos) {
            let faltam = d.totalParcelas - d.parcelaAtual + 1;
            let pendente = faltam * d.valorParcela;
            let vencimento = calcularVencimento(d.inicio, d.parcelaAtual, d.cartao);
            html += `
                <div class="divida-card">
                    <strong>${d.nome}</strong> (Cartão ${d.cartao} - vence dia ${d.cartao === 'A' ? '10' : '25'})<br>
                    📆 ${d.parcelaAtual}/${d.totalParcelas} parcelas - R$ ${d.valorParcela.toFixed(2)}/mês<br>
                    🔜 Próximo vencimento: ${vencimento}<br>
                    💵 Faltam ${faltam}x = R$ ${pendente.toFixed(2)}<br>
                    📞 Telefone: ${d.telefone || 'não cadastrado'}<br>
                    <button onclick="abrirWhats(${d.id})">📲 Cobrar WhatsApp</button>
                    <button onclick="pagarParcela(${d.id})">💰 Pagar parcela</button>
                    <button onclick="excluirDivida(${d.id})" style="background:#ef4444;">🗑️ Excluir</button>
                </div>
            `;
        }
        document.getElementById('listaDividas').innerHTML = html || '<p>Nenhuma dívida ativa.</p>';
        
        // Tabelona
        let tabelaHtml = '';
        for(let d of ativos) {
            let faltam = d.totalParcelas - d.parcelaAtual + 1;
            let pendente = faltam * d.valorParcela;
            tabelaHtml += `
                <tr>
                    <td><strong>${d.nome}</strong></td>
                    <td>${d.cartao}</td>
                    <td>${d.parcelaAtual}/${d.totalParcelas}</td>
                    <td>R$ ${d.valorParcela.toFixed(2)}</td>
                    <td>${faltam}</td>
                    <td>R$ ${pendente.toFixed(2)}</td>
                    <td><button onclick="abrirWhats(${d.id})" style="background:#25D366; padding:6px 12px;">📲 WhatsApp</button></td>
                </tr>
            `;
        }
        document.getElementById('tabelaBody').innerHTML = tabelaHtml;
        
        // Atualizar select de pagamento
        let select = document.getElementById('selectPagar');
        select.innerHTML = ativos.map(d => `<option value="${d.id}">${d.nome} - ${d.parcelaAtual}/${d.totalParcelas} - R$ ${d.valorParcela}</option>`).join('');
    }

    // Pagar parcela
    window.pagarParcela = function(id) {
        let divida = dividas.find(d => d.id === id);
        if(divida && divida.parcelaAtual <= divida.totalParcelas) {
            divida.parcelaAtual++;
            if(!divida.pagamentos) divida.pagamentos = [];
            let hoje = new Date().toISOString().slice(0,10);
            divida.pagamentos.push({ data: hoje, parcela: divida.parcelaAtual-1 });
            salvarDados();
            atualizarTela();
            alert(`✅ Parcela ${divida.parcelaAtual-1} paga com sucesso!`);
        }
    };
    
    // Excluir dívida
    window.excluirDivida = function(id) {
        if(confirm("Tem certeza que quer excluir esta dívida permanentemente?")) {
            dividas = dividas.filter(d => d.id !== id);
            salvarDados();
            atualizarTela();
        }
    };
    
    // Abrir modal WhatsApp com dados da dívida
    window.abrirWhats = function(id) {
        let divida = dividas.find(d => d.id === id);
        if(!divida) return;
        
        let faltam = divida.totalParcelas - divida.parcelaAtual + 1;
        let totalPendente = faltam * divida.valorParcela;
        let vencimento = calcularVencimento(divida.inicio, divida.parcelaAtual, divida.cartao);
        
        let mensagemPadrao = `Olá ${divida.nome}! 🏦\n\n`
            + `Situação da sua dívida no cartão:\n`
            + `📌 Parcela: ${divida.parcelaAtual}/${divida.totalParcelas}\n`
            + `💰 Valor da parcela: R$ ${divida.valorParcela.toFixed(2)}\n`
            + `📅 Próximo vencimento: ${vencimento}\n`
            + `💵 Total pendente: R$ ${totalPendente.toFixed(2)}\n\n`
            + `Qualquer dúvida, entre em contato!`;
        
        document.getElementById('whatsNumero').value = divida.telefone || '';
        document.getElementById('whatsMensagem').value = mensagemPadrao;
        document.getElementById('modalWhats').classList.remove('hidden');
        
        whatsCallback = () => {
            let numero = document.getElementById('whatsNumero').value.replace(/\D/g, '');
            let mensagem = encodeURIComponent(document.getElementById('whatsMensagem').value);
            if(numero) {
                window.open(`https://wa.me/55${numero}?text=${mensagem}`, '_blank');
            } else {
                alert("Por favor, informe o número do WhatsApp");
            }
            document.getElementById('modalWhats').classList.add('hidden');
        };
    };
    
    // Eventos dos botões do modal
    document.getElementById('btnEnviarWhats').onclick = () => { if(whatsCallback) whatsCallback(); };
    document.getElementById('btnFecharWhats').onclick = () => { document.getElementById('modalWhats').classList.add('hidden'); };
    
    // Eventos do formulário
    document.getElementById('btnNovo').onclick = () => { 
        document.getElementById('formNovo').style.display = 'block'; 
        document.getElementById('formPagar').style.display = 'none'; 
    };
    document.getElementById('btnPagar').onclick = () => { 
        document.getElementById('formPagar').style.display = 'block'; 
        document.getElementById('formNovo').style.display = 'none'; 
    };
    document.getElementById('cancelarNovo').onclick = () => { document.getElementById('formNovo').style.display = 'none'; };
    document.getElementById('cancelarPagar').onclick = () => { document.getElementById('formPagar').style.display = 'none'; };
    
    document.getElementById('salvarNovo').onclick = () => {
        let nome = document.getElementById('nome').value.trim();
        let telefone = document.getElementById('telefone').value.trim();
        let valor = parseFloat(document.getElementById('parcelaValor').value);
        let total = parseInt(document.getElementById('totalParcelas').value);
        let cartao = document.getElementById('cartao').value;
        let inicio = document.getElementById('dataInicio').value;
        
        if(!nome || isNaN(valor) || isNaN(total) || valor<=0 || total<=0) { 
            alert("Preencha todos os campos corretamente"); 
            return; 
        }
        if(!inicio) inicio = new Date().toISOString().slice(0,10);
        
        let novaDivida = {
            id: Date.now(),
            nome: nome,
            telefone: telefone,
            valorParcela: valor,
            totalParcelas: total,
            parcelaAtual: 1,
            cartao: cartao,
            inicio: inicio,
            pagamentos: []
        };
        
        dividas.push(novaDivida);
        salvarDados();
        atualizarTela();
        
        // Limpar formulário
        document.getElementById('nome').value = '';
        document.getElementById('telefone').value = '';
        document.getElementById('parcelaValor').value = '';
        document.getElementById('totalParcelas').value = '';
        document.getElementById('dataInicio').value = '';
        document.getElementById('formNovo').style.display = 'none';
        alert("✅ Dívida cadastrada com sucesso!");
    };
    
    document.getElementById('confirmarPagamento').onclick = () => {
        let id = parseInt(document.getElementById('selectPagar').value);
        let divida = dividas.find(d => d.id === id);
        if(divida && divida.parcelaAtual <= divida.totalParcelas) {
            divida.parcelaAtual++;
            if(!divida.pagamentos) divida.pagamentos = [];
            let dataPag = document.getElementById('dataPagamento').value || new Date().toISOString().slice(0,10);
            divida.pagamentos.push({ data: dataPag, parcela: divida.parcelaAtual-1 });
            salvarDados();
            atualizarTela();
            alert("✅ Pagamento registrado!");
            document.getElementById('formPagar').style.display = 'none';
            document.getElementById('dataPagamento').value = '';
        } else { 
            alert("Erro ao registrar pagamento"); 
        }
    };
    
    // Limpar filtros
    document.getElementById('btnLimparFiltros').onclick = () => {
        document.getElementById('filtroNome').value = '';
        document.getElementById('filtroCartao').value = 'all';
        atualizarTela();
    };
    
    // Eventos de filtro
    document.getElementById('filtroNome').addEventListener('input', () => atualizarTela());
    document.getElementById('filtroCartao').addEventListener('change', () => atualizarTela());
    
    // Inicialização
    carregarDados();
    atualizarTela();
</script>
</body>
</html>
